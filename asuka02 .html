<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日香さんのラジオ体操チャレンジ</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (アイコン用) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-pink-50 font-sans min-h-screen">
    <!-- アプリの画面がここに描画されます -->
    <div id="app"></div>

    <script>
        // --- データの保存と読み込み ---

        // 今日の日付を取得 (YYYY-MM-DD形式)
        function getTodayStr() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        const today = getTodayStr();

        // localStorageからデータを読み込む
        function loadRecords() {
            const saved = localStorage.getItem('asukaRadioTaiso');
            return saved ? JSON.parse(saved) : {};
        }

        // localStorageにデータを保存する
        function saveRecords(data) {
            localStorage.setItem('asukaRadioTaiso', JSON.stringify(data));
        }

        // 状態を保持する変数
        let records = loadRecords();
        let showAnimation = false;
        let displayDate = new Date(); // カレンダー表示用の年月

        // 月を切り替える処理
        window.changeMonth = function(offset) {
            displayDate.setMonth(displayDate.getMonth() + offset);
            render();
        };

        // スタンプを押す処理
        function handleStamp() {
            if (!records[today]) {
                records[today] = true; // 今日の記録をつける
                saveRecords(records);  // ブラウザに保存してずっと使えるようにする
                showAnimation = true;  // アニメーション開始
                render();              // 画面を更新

                // 3秒後にアニメーションを終了して再度画面を更新
                setTimeout(() => {
                    showAnimation = false;
                    render();
                }, 3000);
            }
        }

        // --- 画面の描画（レンダリング）処理 ---
        function render() {
            // 連続日数の計算
            let currentStreak = 0;
            let checkDate = new Date();
            
            // 今日まだスタンプを押していない場合は、昨日から遡って計算
            if (!records[today]) {
                checkDate.setDate(checkDate.getDate() - 1);
            }
            
            while (true) {
                const y = checkDate.getFullYear();
                const m = String(checkDate.getMonth() + 1).padStart(2, '0');
                const d = String(checkDate.getDate()).padStart(2, '0');
                const dateStr = `${y}-${m}-${d}`;
                
                if (records[dateStr]) {
                    currentStreak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }

            const totalDays = Object.keys(records).length;

            // 連続日数に応じたメッセージとアイコンの切り替え
            let rankMessage = "今日も頑張りましょう！";
            let rankIconName = "heart";
            let iconColor = "text-pink-400";
            
            if (currentStreak >= 30) {
                 rankMessage = "すごい！ラジオ体操マスターですね！";
                 rankIconName = "award";
                 iconColor = "text-yellow-500";
            } else if (currentStreak >= 14) {
                 rankMessage = "素晴らしい！もう完璧な習慣ですね！";
                 rankIconName = "sparkles";
                 iconColor = "text-purple-500";
            } else if (currentStreak >= 7) {
                 rankMessage = "1週間達成！素晴らしいです！";
                 rankIconName = "star";
                 iconColor = "text-yellow-400";
            } else if (currentStreak >= 3) {
                 rankMessage = "いい調子です！その調子で続けましょう！";
                 rankIconName = "heart";
                 iconColor = "text-pink-500";
            }

            // 表示する月のカレンダーデータを生成
            const displayYear = displayDate.getFullYear();
            const displayMonth = displayDate.getMonth() + 1;
            const daysInMonth = new Date(displayYear, displayMonth, 0).getDate();
            const isCurrentMonthView = (displayYear === new Date().getFullYear() && displayMonth === new Date().getMonth() + 1);

            const calendarDays = [];
            for (let i = 1; i <= daysInMonth; i++) {
                const y = displayYear;
                const m = String(displayMonth).padStart(2, '0');
                const d = String(i).padStart(2, '0');
                const dateStr = `${y}-${m}-${d}`;
                calendarDays.push({
                    dateStr,
                    dayNum: i,
                    isToday: dateStr === today,
                    isDone: !!records[dateStr]
                });
            }

            // カレンダー部分のHTML生成
            const calendarHTML = calendarDays.map(day => `
                <div class="flex flex-col items-center mb-2">
                    <span class="text-xs mb-1 font-bold ${day.isToday ? 'text-pink-600 bg-pink-100 px-1.5 rounded-full' : 'text-gray-500'}">
                        ${day.dayNum}
                    </span>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm border-2 transition-all shadow-sm
                        ${day.isDone 
                            ? 'bg-gradient-to-br from-pink-100 to-pink-200 border-pink-400 text-pink-500 scale-100' 
                            : 'bg-white border-dashed border-gray-300 text-transparent scale-95'}
                        ${day.isToday && !day.isDone ? 'border-pink-400 border-solid animate-bounce' : ''}
                    ">
                        ${day.isDone ? '<i data-lucide="star" class="w-4 h-4 text-pink-500 fill-current"></i>' : ''}
                    </div>
                </div>
            `).join('');

            // アプリ全体のHTMLを生成して画面に反映
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="flex flex-col items-center py-8 px-4 relative overflow-hidden">
                    
                    <!-- スタンプを押した時のアニメーションエフェクト -->
                    ${showAnimation ? `
                        <div class="absolute inset-0 pointer-events-none flex items-center justify-center z-50">
                             <div class="animate-bounce absolute text-yellow-400">
                                 <i data-lucide="star" class="w-32 h-32 fill-current"></i>
                             </div>
                        </div>
                    ` : ''}
                    
                    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-pink-200">
                        <!-- ヘッダー部分 -->
                        <div class="bg-gradient-to-r from-pink-400 to-rose-400 text-white p-6 text-center rounded-b-3xl shadow-md">
                            <h1 class="text-2xl font-bold mb-2 tracking-wider">明日香さんのラジオ体操</h1>
                            <p class="text-pink-100 text-sm">毎日楽しく続けよう！</p>
                        </div>

                        <!-- メインアクション部分 -->
                        <div class="p-8 text-center flex flex-col items-center">
                            <div class="w-24 h-24 rounded-full bg-pink-100 flex items-center justify-center mb-4 transition-transform duration-500 ${showAnimation ? 'scale-125' : ''}">
                                 <i data-lucide="${rankIconName}" class="w-12 h-12 ${iconColor}" stroke-width="2.5"></i>
                            </div>
                            
                            <h2 class="text-lg font-bold text-gray-700 mb-1">${rankMessage}</h2>
                            
                            <div class="flex gap-4 my-4 w-full justify-center">
                                <div class="bg-orange-50 rounded-xl p-3 px-5 border border-orange-200 w-1/2">
                                    <p class="text-xs text-orange-600 font-bold mb-1">連続</p>
                                    <p class="text-2xl font-black text-orange-500">${currentStreak}<span class="text-sm font-bold">日</span></p>
                                </div>
                                <div class="bg-blue-50 rounded-xl p-3 px-5 border border-blue-200 w-1/2">
                                    <p class="text-xs text-blue-600 font-bold mb-1">累計</p>
                                    <p class="text-2xl font-black text-blue-500">${totalDays}<span class="text-sm font-bold">回</span></p>
                                </div>
                            </div>

                            <!-- スタンプボタン -->
                            <button id="stamp-btn" class="mt-4 w-full py-5 rounded-full font-bold text-xl transition-all duration-300 transform active:scale-95 shadow-lg flex items-center justify-center gap-2
                                    ${records[today] 
                                        ? 'bg-gray-200 text-gray-500 cursor-not-allowed shadow-none border-2 border-gray-300' 
                                        : 'bg-gradient-to-r from-orange-400 to-pink-500 text-white hover:from-orange-500 hover:to-pink-600 hover:shadow-xl hover:-translate-y-1'
                                    }" ${records[today] ? 'disabled' : ''}>
                                ${records[today] ? `
                                    <i data-lucide="check" class="w-7 h-7 text-green-500" stroke-width="3"></i>
                                    本日は完了！
                                ` : `
                                    <i data-lucide="star" class="w-7 h-7 text-yellow-200 animate-pulse fill-current"></i>
                                    スタンプを押す！
                                `}
                            </button>
                            
                            ${!records[today] ? `
                                <p class="text-xs text-pink-500 mt-4 font-bold animate-pulse">
                                    今日もラジオ体操をしてスタンプを押しましょう！
                                </p>
                            ` : ''}
                        </div>

                        <!-- 動画リンク部分 -->
                        <div class="px-6 pb-6">
                            <a href="https://www.youtube.com/results?search_query=%E3%83%A9%E3%82%B8%E3%82%AA%E4%BD%93%E6%93%8D" target="_blank" rel="noopener noreferrer"
                               class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border border-gray-200 hover:bg-pink-50 hover:border-pink-200 transition-all group text-decoration-none shadow-sm">
                                <div class="flex items-center gap-3">
                                    <div class="bg-red-100 p-3 rounded-full text-red-500 group-hover:bg-red-500 group-hover:text-white transition-colors shadow-inner">
                                        <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                                    </div>
                                    <div class="text-left">
                                        <p class="text-sm font-bold text-gray-700">ラジオ体操の動画</p>
                                        <p class="text-xs text-gray-400">YouTubeで探して開始する</p>
                                    </div>
                                </div>
                                <div class="text-gray-300 group-hover:text-pink-400 font-bold">
                                     &gt;
                                </div>
                            </a>
                        </div>

                        <!-- カレンダー（過去の記録）部分 -->
                        <div class="bg-pink-50/50 p-6 border-t-2 border-pink-100 rounded-b-3xl">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center gap-2 text-pink-600">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                    <h3 class="font-bold text-sm">${displayYear}年 ${displayMonth}月の記録</h3>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="changeMonth(-1)" class="p-1 rounded-full hover:bg-pink-200 text-pink-600 transition-colors">
                                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                                    </button>
                                    <button onclick="changeMonth(1)" class="p-1 rounded-full hover:bg-pink-200 text-pink-600 transition-colors ${isCurrentMonthView ? 'opacity-50 cursor-not-allowed' : ''}" ${isCurrentMonthView ? 'disabled' : ''}>
                                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="grid grid-cols-7 gap-y-3 gap-x-1">
                                ${calendarHTML}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // イベントリスナーの設定（ボタンをクリックした時の処理）
            const stampBtn = document.getElementById('stamp-btn');
            if (stampBtn && !records[today]) {
                stampBtn.addEventListener('click', handleStamp);
            }

            // HTMLに埋め込んだアイコン(<i data-lucide="...">)を描画
            lucide.createIcons();
        }

        // アプリ起動時の最初の画面描画
        render();
    </script>
</body>
</html>
